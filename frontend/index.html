<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixer Dashboard</title>
    <script defer src="./node_modules/alpinejs/dist/cdn.min.js"></script>
</head>

<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px;">

    <div x-data="crudApp()" x-init="readItems()">
        <h1>Pide info a la DB</h1>

        <section style="margin-bottom: 2rem;">
            <input type="text" x-model="newItemName" placeholder="Nombre del objeto a crear" style="padding: 8px;">
            <button @click="createItem()" style="padding: 8px 16px;">Añadir</button>
        </section>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #ccc;">
                    <th style="padding: 10px;">ID</th>
                    <th style="padding: 10px;">Nombre</th>
                    <th style="padding: 10px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="item in items" :key="item.id">
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px;" x-text="item.id"></td>
                        <td style="padding: 10px;">
                            <span x-show="!item.isEditing" x-text="item.name"></span>
                            <input x-show="item.isEditing" type="text" x-model="item.tempName" style="padding: 4px;">
                        </td>
                        <td style="padding: 10px;">
                            <button x-show="!item.isEditing" @click="startEdit(item)">Editar</button>
                            <button x-show="item.isEditing" @click="updateItem(item)">Guardar</button>
                            <button x-show="item.isEditing" @click="item.isEditing = false">Cancelar</button>

                            <button @click="deleteItem(item.id)" style="color: red;">Eliminar</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        function crudApp() {
            return {
                items: [],
                newItemName: '',
                apiUrl: '/api/items',

                async readItems() {
                    try {
                        const response = await fetch(this.apiUrl);
                        const data = await response.json();
                        this.items = data.map(item => ({ ...item, isEditing: false, tempName: item.name }));
                    } catch (error) {
                        console.error('Error obteniendo información:', error);
                    }
                },

                async createItem() {
                    if (!this.newItemName.trim()) return;
                    try {
                        const response = await fetch(this.apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: this.newItemName })
                        });
                        if (response.ok) {
                            this.newItemName = '';
                            await this.readItems();
                        }
                    } catch (error) {
                        console.error('Error creando item:', error);
                    }
                },

                startEdit(item) {
                    item.tempName = item.name;
                    item.isEditing = true;
                },

                async updateItem(item) {
                    try {
                        const response = await fetch(`${this.apiUrl}/${item.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: item.tempName })
                        });
                        if (response.ok) {
                            item.name = item.tempName;
                            item.isEditing = false;
                        }
                    } catch (error) {
                        console.error('Error actualizando item:', error);
                    }
                },

                async deleteItem(id) {
                    if (!confirm('Estas seguro?')) return;
                    try {
                        const response = await fetch(`${this.apiUrl}/${id}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            this.items = this.items.filter(i => i.id !== id);
                        }
                    } catch (error) {
                        console.error('Error eliminando item:', error);
                    }
                }
            }
        }
    </script>
</body>

</html>
